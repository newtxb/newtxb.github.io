<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="never">
    <link rel="stylesheet" href="assets/main.css">
    <link rel="shortcut icon" type="image/png" href="assets/favicon.png" />
    <title>Home</title>
</head>
<body style="background-color: #06273d">
  <div class="background">
    <!-- JS will make stuff like <div class="bg"></div> -->
  </div>
  <div class="particles"></div>
  <div class="unsplash-info" aria-live="polite">
    <button class="unsplash-info-trigger button-trigger" type="button" aria-label="Unsplash image details" title="Unsplash image details">✨</button>
    <div class="panel-menu unsplash-info-menu" role="group" aria-label="Unsplash image actions">
      <div class="unsplash-info-text">Image details unavailable</div>
      <div class="unsplash-info-actions">
        <a class="unsplash-info-link" href="#" target="_blank" rel="noopener noreferrer">See on Unsplash</a>
        <button type="button" class="unsplash-info-reload">Reload today's photo</button>
      </div>
    </div>
  </div>
  <button class="settings-trigger button-trigger" type="button" aria-label="Open settings" title="Settings">⚙</button>
  <div class="settings-modal" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="settings-title">
    <div class="settings-backdrop" data-close-settings></div>
    <div class="settings-panel" role="document">
      <div class="settings-header">
        <h2 id="settings-title">Settings</h2>
        <button class="settings-close" type="button" aria-label="Close settings" data-close-settings>×</button>
      </div>
      <div class="settings-content">
        <label class="settings-toggle">
          <input type="checkbox" name="showDate" checked>
          <span>Show date</span>
          <span class="settings-toggle-hint">bottom left</span>
        </label>
        <label class="settings-toggle">
          <input type="checkbox" name="showQuote" checked>
          <span>Show quote</span>
          <span class="settings-toggle-hint">center</span>
        </label>
        <label class="settings-toggle">
          <input type="checkbox" name="showWeather" checked>
          <span>Show weather</span>
          <span class="settings-toggle-hint">right</span>
        </label>
        <label class="settings-location settings-inline-field">
          <span>Weather location</span>
          <input type="text" name="weatherLocation" placeholder="Leave empty for auto location" autocomplete="off">
        </label>
        <label class="settings-location settings-inline-field">
          <span>Username</span>
          <input type="text" name="username" placeholder="Defaults to cute greeting" autocomplete="off">
        </label>
        <div class="settings-separator" aria-hidden="true"></div>
        <div class="settings-toggle-row">
          <label class="settings-toggle">
            <input type="checkbox" name="useUnsplash">
            <span>Use Unsplash backgrounds</span>
          </label>
          <button type="button" class="settings-secondary-btn" data-reset-unsplash-photo>Reset history</button>
        </div>
        <div class="settings-unsplash-auth" data-auth-section>
          <label class="settings-location">
            <span>Enter password to unlock</span>
            <input type="text" name="unsplashPassword" placeholder="Enter password" autocomplete="off">
            <button type="button" class="settings-unlock-btn" data-unlock-unsplash>Unlock</button>
          </label>
        </div>
        <label class="settings-location" data-keywords-section>
          <span>Search keywords (separated by <code>,</code>)</span>
          <input type="text" name="unsplashKeywords" placeholder="e.g. nature;space;city">
        </label>
      </div>
    </div>
  </div>
  <div class="app columns">
    <!-- Notifications -->
    <div class="notifications">
      <a class="notification update" href="javascript:window.location.reload()">
        <div class="title">🆕 Update downloaded!</div>
        <div class="content">Reload the page or click here to update.</div>
      </a>
    </div>
    <!-- Top bar -->
    <div class="section section-bar section-top">
      <div class="search">
        &nbsp;
        <form action="https://www.google.com/search" class="search-form" method="GET">
          <div class="search-label">Type to search&hellip;</div>
          <div class="search-box">
            <div class="search-input-wrapper">
              <input
                type="text"
                class="search-input"
                placeholder="                              º^º"
                name="q"
                autocomplete="off"
                autocorrect="off"
                autocapitalize="off"
                spellcheck="false"
              >
              <span class="search-provider-hint" aria-hidden="true">
                <span class="search-escape-hint"><span class="keycap search-cancel-key">Esc</span> <span class="search-cancel-text">cancel</span></span>
                ···
                <span class="search-provider-text">search with Google</span>
                <span class="keycap search-action-key">Tab</span>
              </span>
              <button
                type="button"
                class="search-chatgpt-button"
                aria-label="Ask ChatGPT"
                title="Ask ChatGPT"
              ></button>
            </div>
            <div class="search-suggestions">
              <!-- This kind of node will be made in JS: <div class="search-suggestion"></div> -->
            </div>
          </div>
        </form>
      </div>
    </div>

    <!-- Real stuff -->
    <div class="section section-center">
      <h1 class="clock">
        <span class="hours">--</span>:<span class="minutes">--</span><!--
        --><div class="show-seconds">:<span class="seconds">--</span><!--
        --><div class="show-milliseconds">.<span class="milliseconds">---</div></div>
      </h1>
      <h3 class="welcome-text">Hi!</h3>
    </div>

    <!-- Bottom things -->
    <div class="section section-bar section-bottom">
      <div class="rows">
        <div>
          <div class="row calendar"></div>
        </div>
        <div>
          <div class="row row-quote">
            <div class="quote">
              <div class="text"></div>
              <div class="author"></div>
            </div>
          </div>
        </div>
        <div>
          <div class="row weather"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Useless garbage -->
  <script src="assets/main.js"></script>
  <script>
    if ('serviceWorker' in navigator && window.location.hostname !== 'localhost') {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
</body>
</html>
