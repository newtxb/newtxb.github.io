<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="never">
    <link rel="stylesheet" href="assets/main.css">
    <link rel="shortcut icon" type="image/png" href="assets/favicon.png" />
    <title>Home</title>
</head>
<body>
  <div class="background">
    <!-- JS will make stuff like <div class="bg"></div> -->
  </div>
  <div class="particles"></div>
  <button class="settings-trigger" type="button" aria-label="Open settings" title="Settings">⚙</button>
  <div class="settings-modal" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="settings-title">
    <div class="settings-backdrop" data-close-settings></div>
    <div class="settings-panel" role="document">
      <div class="settings-header">
        <h2 id="settings-title">Settings</h2>
        <button class="settings-close" type="button" aria-label="Close settings" data-close-settings>×</button>
      </div>
      <div class="settings-content">
        <label class="settings-toggle">
          <input type="checkbox" name="showDate" checked>
          <span>Show date</span>
        </label>
        <label class="settings-toggle">
          <input type="checkbox" name="showQuote" checked>
          <span>Show quote</span>
        </label>
        <label class="settings-toggle">
          <input type="checkbox" name="showWeather" checked>
          <span>Show weather</span>
        </label>
        <label class="settings-location">
          <span>Weather location override</span>
          <input type="text" name="weatherLocation" placeholder="Leave empty for auto location" autocomplete="off">
        </label>
      </div>
    </div>
  </div>
  <div class="app columns">
    <!-- Notifications -->
    <div class="notifications">
      <a class="notification update" href="javascript:window.location.reload()">
        <div class="title">🆕 Update downloaded!</div>
        <div class="content">Reload the page or click here to update.</div>
      </a>
    </div>
    <!-- Top bar -->
    <div class="section section-bar section-top">
      <div class="search">
        &nbsp;
        <form action="https://www.google.com/search" class="search-form" method="GET">
          <div class="search-label">Type to search&hellip;</div>
          <div class="search-box">
            <div class="search-input-wrapper">
              <input
                type="text"
                class="search-input"
                placeholder="Type to search"
                name="q"
                autocomplete="off"
                autocorrect="off"
                autocapitalize="off"
                spellcheck="false"
              >
              <span class="search-provider-hint" aria-hidden="true">
                <span class="search-escape-hint"><span class="keycap">Esc</span> cancel</span>
                ···
                <span class="search-provider-text">search with Google</span>
                <span class="keycap">Tab</span>
              </span>
              <button
                type="button"
                class="search-chatgpt-button"
                aria-label="Ask ChatGPT"
                title="Ask ChatGPT"
              ></button>
            </div>
            <div class="search-suggestions">
              <!-- This kind of node will be made in JS: <div class="search-suggestion"></div> -->
            </div>
          </div>
        </form>
      </div>
    </div>

    <!-- Real stuff -->
    <div class="section section-center">
      <h1 class="clock">
        <span class="hours">--</span>:<span class="minutes">--</span><!--
        --><div class="show-seconds">:<span class="seconds">--</span><!--
        --><div class="show-milliseconds">.<span class="milliseconds">---</div></div>
      </h1>
      <h3 class="welcome-text">Hi!</h3>
    </div>

    <!-- Bottom things -->
    <div class="section section-bar section-bottom">
      <div class="rows">
        <div>
          <div class="calendar"></div>
        </div>
        <div>
          <div class="quote">
            <div class="text"></div>
            <div class="author"></div>
          </div>
        </div>
        <div>
          <div class="weather"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Useless garbage -->
  <script src="assets/main.js"></script>
  <script>
    if ('serviceWorker' in navigator && window.location.hostname !== 'localhost') {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
</body>
</html>
